<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Penalty Soccer Cartoon</title>

<style>

body{
margin:0;
background:#063b06;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#container{
text-align:center;
}

#ui{
color:white;
font-size:22px;
margin-bottom:10px;
font-weight:bold;
}

canvas{
border-radius:20px;
border:5px solid white;
}

</style>

</head>
<body>

<div id="container">

<div id="ui">
⚽ SCORE: <span id="score">0</span> | SHOT: <span id="shot">0</span>/6
</div>

<canvas id="game" width="900" height="500"></canvas>

</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let score=0
let shot=0
let shooting=false

let ball={x:450,y:380,r:14,vx:0,vy:0}

let keeper={x:450,y:160,dir:2,jump:false,targetX:450}

const goal={x:320,y:70,w:260}

const targets=[
{x:340,y:100},
{x:450,y:100},
{x:560,y:100},
{x:340,y:150},
{x:560,y:150}
]

canvas.addEventListener("click",(e)=>{

if(shooting||shot>=6)return

let x=e.offsetX
let y=e.offsetY

for(let t of targets){

if(Math.hypot(x-t.x,y-t.y)<25){
shootBall(t.x,t.y)
}

}

})

function shootBall(tx,ty){

shooting=true
shot++
document.getElementById("shot").innerText=shot

ball.vx=(tx-ball.x)*0.08
ball.vy=(ty-ball.y)*0.08

if(Math.random()<0.7){
keeper.targetX=tx
}else{
keeper.targetX=goal.x+Math.random()*goal.w
}

keeper.jump=true

}

function drawBackground(){

// langit stadion
let sky=ctx.createLinearGradient(0,0,0,250)
sky.addColorStop(0,"#0a1f3a")
sky.addColorStop(1,"#3a6ea5")
ctx.fillStyle=sky
ctx.fillRect(0,0,900,250)

// rumput
let grass=ctx.createLinearGradient(0,200,0,500)
grass.addColorStop(0,"#2e7d32")
grass.addColorStop(1,"#145214")
ctx.fillStyle=grass
ctx.fillRect(0,200,900,300)

// garis lapangan
ctx.strokeStyle="white"
ctx.lineWidth=3
ctx.strokeRect(200,200,500,200)

}

function drawGoal(){

ctx.fillStyle="white"

ctx.fillRect(goal.x,70,goal.w,10)
ctx.fillRect(goal.x,70,10,80)
ctx.fillRect(goal.x+goal.w-10,70,10,80)

// jaring
ctx.strokeStyle="#cccccc"

for(let i=0;i<goal.w;i+=20){
ctx.beginPath()
ctx.moveTo(goal.x+i,70)
ctx.lineTo(goal.x+i,150)
ctx.stroke()
}

}

function drawKeeper(){

// badan
ctx.fillStyle="#2962ff"
ctx.fillRect(keeper.x-18,keeper.y-20,36,40)

// kepala
ctx.fillStyle="#ffd6a5"
ctx.beginPath()
ctx.arc(keeper.x,keeper.y-35,14,0,Math.PI*2)
ctx.fill()

// tangan
ctx.fillRect(keeper.x-35,keeper.y-15,18,6)
ctx.fillRect(keeper.x+17,keeper.y-15,18,6)

// sarung tangan
ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(keeper.x-37,keeper.y-12,6,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(keeper.x+37,keeper.y-12,6,0,Math.PI*2)
ctx.fill()

// kaki
ctx.fillStyle="#1e40af"
ctx.fillRect(keeper.x-10,keeper.y+15,8,20)
ctx.fillRect(keeper.x+2,keeper.y+15,8,20)

}

function drawPlayer(){

let x=450
let y=420

// badan
ctx.fillStyle="#ff7a00"
ctx.fillRect(x-18,y-30,36,40)

// kepala
ctx.fillStyle="#ffd6a5"
ctx.beginPath()
ctx.arc(x,y-45,14,0,Math.PI*2)
ctx.fill()

// tangan
ctx.fillRect(x-35,y-20,18,6)
ctx.fillRect(x+17,y-20,18,6)

// kaki
ctx.fillStyle="#0f766e"
ctx.fillRect(x-10,y+10,8,20)
ctx.fillRect(x+2,y+10,8,20)

}

function drawBall(){

let g=ctx.createRadialGradient(ball.x-4,ball.y-4,4,ball.x,ball.y,ball.r)
g.addColorStop(0,"white")
g.addColorStop(1,"#bbbbbb")

ctx.fillStyle=g

ctx.beginPath()
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="black"
ctx.lineWidth=2
ctx.beginPath()
ctx.arc(ball.x,ball.y,ball.r*0.6,0,Math.PI*2)
ctx.stroke()

}

function update(){

ball.x+=ball.vx
ball.y+=ball.vy

ball.vx*=0.99
ball.vy*=0.99

if(!keeper.jump){

keeper.x+=keeper.dir

if(keeper.x>600||keeper.x<300){
keeper.dir*=-1
}

}else{

keeper.x+=(keeper.targetX-keeper.x)*0.15

}

if(Math.hypot(ball.x-keeper.x,ball.y-keeper.y)<30){
reset()
}

if(ball.y<80&&ball.x>goal.x&&ball.x<goal.x+goal.w){

score++
document.getElementById("score").innerText=score
reset()

}

if(ball.y<70){
reset()
}

}

function reset(){

ball.x=450
ball.y=380
ball.vx=0
ball.vy=0
keeper.jump=false
shooting=false

}

function loop(){

drawBackground()
drawGoal()
drawKeeper()
drawPlayer()
drawBall()

update()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
