<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Penalty Kick Game</title>

<style>

body{
background:#1c7c34;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
font-family:Arial;
}

/* LAPANGAN */

#field{
position:relative;
width:900px;
height:500px;
background:#3fa34d;
border:6px solid white;
}

/* GAWANG */

#goal{
position:absolute;
top:40px;
left:330px;
width:240px;
height:120px;
border:6px solid white;
border-bottom:none;
}

/* PLAYER */

#player{
position:absolute;
bottom:60px;
left:420px;
width:80px;
transition:0.3s;
}

/* KEEPER */

#keeper{
position:absolute;
top:100px;
left:420px;
width:80px;
transition:0.4s;
}

/* BALL */

#ball{
position:absolute;
bottom:90px;
left:450px;
width:35px;
transition:0.7s;
}

/* BUTTON */

.controls{
margin-top:20px;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
cursor:pointer;
border:none;
background:#1e1e1e;
color:white;
border-radius:5px;
}

button:hover{
background:#444;
}

</style>
</head>

<body>

<div id="field">

<div id="goal"></div>

<!-- PLAYER -->
<img id="player"
src="https://cdn-icons-png.flaticon.com/512/4339/4339987.png">

<!-- KEEPER -->
<img id="keeper"
src="https://cdn-icons-png.flaticon.com/512/236/236832.png">

<!-- BALL -->
<img id="ball"
src="https://cdn-icons-png.flaticon.com/512/53/53283.png">

</div>

<div class="controls">

<button onclick="shoot('left')">KIRI</button>
<button onclick="shoot('center')">TENGAH</button>
<button onclick="shoot('right')">KANAN</button>

</div>

<script>

function shoot(direction){

let ball=document.getElementById("ball");
let keeper=document.getElementById("keeper");
let player=document.getElementById("player");

/* ANIMASI TENDANG */

player.style.transform="rotate(-20deg)";

setTimeout(()=>{
player.style.transform="rotate(0deg)";
},200);

/* GERAKAN BOLA */

if(direction=="left"){
ball.style.left="330px";
ball.style.top="150px";
}

if(direction=="center"){
ball.style.left="450px";
ball.style.top="130px";
}

if(direction=="right"){
ball.style.left="560px";
ball.style.top="150px";
}

/* GERAKAN KIPER RANDOM */

let dive=Math.floor(Math.random()*3);

setTimeout(()=>{

if(dive==0){
keeper.style.left="330px";
}

if(dive==1){
keeper.style.left="420px";
}

if(dive==2){
keeper.style.left="560px";
}

},200);

}

</script>

</body>
</html>
