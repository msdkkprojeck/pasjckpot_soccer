<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini Soccer Game</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="soccer.css">

</head>

<body>

<div class="overlay"></div>

<section class="page active">

<!-- LOGO -->
<img src="https://i.ibb.co/BKNPDfmy/logo-pasjackpot.webp" class="logo small" alt="Logo">

<!-- AREA GAME -->
<div class="game-container">

  <!-- GAWANG -->
  <div class="goal">
    <img src="https://cdn-icons-png.flaticon.com/512/861/861512.png" class="goal-img">
  </div>

  <!-- KIPER -->
  <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="goalkeeper">

  <!-- BOLA -->
  <img src="https://cdn-icons-png.flaticon.com/512/53/53283.png" id="ball">

  <!-- HASIL -->
  <div id="result"></div>

</div>

<!-- BUTTON KEMBALI -->
<button class="btn-glow small" onclick="window.location.href='index.html'">
KEMBALI
</button>

</section>

<!-- SCRIPT GAME -->
<script src="soccer.js"></script>

</body>
</html>
