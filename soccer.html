<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penalty Soccer Cartoon</title>

<style>

body{
margin:0;
background:#0a3a0a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#gameContainer{
position:relative;
}

#ui{
position:absolute;
top:-50px;
left:0;
right:0;
text-align:center;
color:white;
font-size:26px;
font-weight:bold;
}

canvas{
border:6px solid white;
border-radius:20px;
background:#2e7d32;
}

#goalText{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%) scale(0);
font-size:70px;
color:yellow;
font-weight:bold;
pointer-events:none;
}

.goalAnim{
animation:goal 1s forwards;
}

@keyframes goal{
0%{transform:translate(-50%,-50%) scale(0)}
40%{transform:translate(-50%,-50%) scale(1.3)}
100%{transform:translate(-50%,-50%) scale(0)}
}

</style>
</head>

<body>

<div id="gameContainer">

<div id="ui">
⚽ SCORE: <span id="score">0</span> | SHOT: <span id="shot">0</span>/6
</div>

<div id="goalText">GOAL!!</div>

<canvas id="game" width="900" height="500"></canvas>

</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let score=0;
let shot=0;
let shooting=false;

let ball={
x:450,
y:400,
r:18,
vx:0,
vy:0,
rot:0
};

let keeper={
x:450,
y:160,
targetX:450,
speed:0.15
};

const goal={
x:300,
y:60,
w:300,
h:130
};

canvas.addEventListener("click",shoot);

function shoot(e){

if(shooting || shot>=6)return;

const rect=canvas.getBoundingClientRect();

const x=(e.clientX-rect.left)*(canvas.width/rect.width);
const y=(e.clientY-rect.top)*(canvas.height/rect.height);

if(x>goal.x && x<goal.x+goal.w && y>goal.y && y<goal.y+goal.h){

ball.vx=(x-ball.x)*0.09;
ball.vy=(y-ball.y)*0.09;

keeper.targetX=x;

shot++;
document.getElementById("shot").innerText=shot;

shooting=true;

}

}

function drawField(){

const sky=ctx.createLinearGradient(0,0,0,200);
sky.addColorStop(0,"#0a1f3a");
sky.addColorStop(1,"#3a6ea5");

ctx.fillStyle=sky;
ctx.fillRect(0,0,900,200);

ctx.fillStyle="#2e7d32";
ctx.fillRect(0,200,900,300);

ctx.strokeStyle="white";
ctx.lineWidth=3;
ctx.strokeRect(200,200,500,200);

}

function drawGoal(){

ctx.fillStyle="#ffffff";

ctx.fillRect(goal.x,goal.y,goal.w,10);
ctx.fillRect(goal.x,goal.y,10,goal.h);
ctx.fillRect(goal.x+goal.w-10,goal.y,10,goal.h);

}

function drawKeeper(){

keeper.x+= (keeper.targetX-keeper.x)*keeper.speed;

ctx.fillStyle="#2e6cff";

ctx.beginPath();
ctx.arc(keeper.x,keeper.y-30,14,0,Math.PI*2);
ctx.fill();

ctx.fillRect(keeper.x-12,keeper.y-30,24,35);

ctx.fillRect(keeper.x-28,keeper.y-25,16,8);
ctx.fillRect(keeper.x+12,keeper.y-25,16,8);

ctx.fillRect(keeper.x-12,keeper.y+5,10,20);
ctx.fillRect(keeper.x+2,keeper.y+5,10,20);

}

function drawPlayer(){

const x=450;
const y=430;

ctx.fillStyle="#ff9933";

ctx.beginPath();
ctx.arc(x,y-35,14,0,Math.PI*2);
ctx.fill();

ctx.fillRect(x-12,y-35,24,40);

ctx.fillRect(x-28,y-20,16,8);
ctx.fillRect(x+12,y-20,16,8);

ctx.fillRect(x-12,y+5,10,22);
ctx.fillRect(x+2,y+5,10,22);

}

function drawBall(){

ball.rot+=0.1;

ctx.save();

ctx.translate(ball.x,ball.y);
ctx.rotate(ball.rot);

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(0,0,ball.r,0,Math.PI*2);
ctx.fill();

ctx.strokeStyle="black";
ctx.lineWidth=2;

ctx.beginPath();
ctx.arc(0,0,ball.r*0.7,0,Math.PI*2);
ctx.stroke();

ctx.restore();

}

function update(){

ball.x+=ball.vx;
ball.y+=ball.vy;

ball.vx*=0.98;
ball.vy*=0.98;

const dx=ball.x-keeper.x;
const dy=ball.y-(keeper.y-20);

if(Math.sqrt(dx*dx+dy*dy)<35){

reset();

}

if(ball.y<goal.y+goal.h && ball.x>goal.x && ball.x<goal.x+goal.w){

score++;

document.getElementById("score").innerText=score;

showGoal();

reset();

}

if(ball.y<0 || ball.x<0 || ball.x>900){

reset();

}

}

function showGoal(){

const g=document.getElementById("goalText");

g.classList.remove("goalAnim");
void g.offsetWidth;
g.classList.add("goalAnim");

}

function reset(){

if(shot>=6)return;

ball.x=450;
ball.y=400;
ball.vx=0;
ball.vy=0;

shooting=false;

}

function loop(){

ctx.clearRect(0,0,900,500);

drawField();
drawGoal();
drawKeeper();
drawPlayer();
drawBall();

update();

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
