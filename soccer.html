```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Penalty Kick Mini Game</title>

<style>

body{
background:#1c7c34;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
font-family:Arial;
}

/* LAPANGAN */

#field{
position:relative;
width:900px;
height:500px;
background:linear-gradient(#4caf50,#2e7d32);
border:5px solid white;
overflow:hidden;
}

/* GAWANG */

#goal{
position:absolute;
top:40px;
left:320px;
width:250px;
height:120px;
border:6px solid white;
border-bottom:none;
}

/* PEMAIN */

#player{
position:absolute;
bottom:60px;
left:420px;
width:90px;
transition:0.3s;
}

/* KIPER */

#keeper{
position:absolute;
top:110px;
left:420px;
width:90px;
transition:0.4s;
}

/* BOLA */

#ball{
position:absolute;
bottom:90px;
left:450px;
width:40px;
transition:0.7s;
}

/* TOMBOL */

.controls{
margin-top:20px;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
cursor:pointer;
border:none;
background:#222;
color:white;
border-radius:5px;
}

button:hover{
background:#444;
}

</style>
</head>

<body>

<div id="field">

<div id="goal"></div>

<!-- PEMAIN -->
<img id="player"
src="https://upload.wikimedia.org/wikipedia/commons/8/8e/Football_player_silhouette.svg">

<!-- KIPER -->
<img id="keeper"
src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Goalkeeper_silhouette.svg">

<!-- BOLA -->
<img id="ball"
src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg">

</div>

<div class="controls">
<button onclick="shoot('left')">KIRI</button>
<button onclick="shoot('center')">TENGAH</button>
<button onclick="shoot('right')">KANAN</button>
</div>

<script>

function shoot(direction){

let ball = document.getElementById("ball");
let keeper = document.getElementById("keeper");
let player = document.getElementById("player");

/* ANIMASI TENDANG */

player.style.transform="rotate(-15deg)";

setTimeout(()=>{
player.style.transform="rotate(0deg)";
},200);

/* GERAKAN BOLA */

if(direction=="left"){
ball.style.left="330px";
ball.style.top="140px";
}

if(direction=="center"){
ball.style.left="450px";
ball.style.top="120px";
}

if(direction=="right"){
ball.style.left="560px";
ball.style.top="140px";
}

/* GERAKAN KIPER RANDOM */

let dive = Math.floor(Math.random()*3);

setTimeout(()=>{

if(dive==0){
keeper.style.left="330px";
}

if(dive==1){
keeper.style.left="420px";
}

if(dive==2){
keeper.style.left="540px";
}

},200);

}

</script>

</body>
</html>
