```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Penalty Kick Animation</title>

<style>

body{
background:#0f7a2a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
font-family:Arial;
}

#stadium{
position:relative;
width:800px;
height:450px;
background:linear-gradient(#3aa655,#1e7c3a);
border:4px solid white;
overflow:hidden;
}

/* gawang */

#goal{
position:absolute;
top:40px;
left:250px;
width:300px;
height:120px;
border:6px solid white;
border-bottom:none;
}

/* kiper */

#keeper{
position:absolute;
top:120px;
left:360px;
width:80px;
transition:0.4s;
}

/* bola */

#ball{
position:absolute;
bottom:40px;
left:380px;
width:40px;
transition:0.7s;
}

/* kontrol */

.controls{
text-align:center;
margin-top:20px;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div>

<div id="stadium">

<div id="goal"></div>

<img id="keeper"
src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png">

<img id="ball"
src="https://cdn-icons-png.flaticon.com/512/53/53283.png">

</div>

<div class="controls">
<button onclick="shoot('left')">KIRI</button>
<button onclick="shoot('center')">TENGAH</button>
<button onclick="shoot('right')">KANAN</button>
</div>

</div>

<script>

function shoot(direction){

let ball = document.getElementById("ball");
let keeper = document.getElementById("keeper");

if(direction=="left"){
ball.style.left="260px";
ball.style.top="120px";
}

if(direction=="center"){
ball.style.left="380px";
ball.style.top="100px";
}

if(direction=="right"){
ball.style.left="500px";
ball.style.top="120px";
}

/* kiper random */

let dive = Math.floor(Math.random()*3);

setTimeout(()=>{

if(dive==0){
keeper.style.left="260px";
}

if(dive==1){
keeper.style.left="360px";
}

if(dive==2){
keeper.style.left="470px";
}

},200);

}

</script>

</body>
</html>
```
