<!DOCTYPE html>
<html>
<head>
<title>Penalty Soccer Pro</title>

<style>

body{
margin:0;
overflow:hidden;
background:#1b5e20;
font-family:Arial;
}

canvas{
display:block;
margin:auto;
background:#43a047;
}

#ui{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<div id="ui">
Score: <span id="score">0</span> |
Shot: <span id="shot">0</span>/5
</div>

<canvas id="game" width="900" height="500"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let score=0
let shot=0
let shooting=false

let ball={
x:450,
y:380,
r:10,
vx:0,
vy:0
}

let keeper={
x:450,
y:140,
dir:3,
jump:false,
targetX:450
}

let goal={
x:320,
y:80,
w:260,
h:10
}

let targets=[
{x:340,y:90},
{x:450,y:90},
{x:560,y:90},
{x:340,y:140},
{x:560,y:140}
]

canvas.addEventListener("click",(e)=>{

if(shooting) return
if(shot>=5) return

let x=e.offsetX
let y=e.offsetY

for(let t of targets){

let d=Math.hypot(x-t.x,y-t.y)

if(d<30){

shootBall(t.x,t.y)

}

}

})

function shootBall(tx,ty){

shooting=true
shot++

document.getElementById("shot").innerText=shot

ball.vx=(tx-ball.x)*0.08
ball.vy=(ty-ball.y)*0.08

// AI keeper normal
let guess=Math.random()

if(guess<0.6){
keeper.targetX=tx
}else{
keeper.targetX=goal.x+Math.random()*goal.w
}

keeper.jump=true

}

function drawField(){

ctx.fillStyle="#43a047"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.fillRect(goal.x,goal.y,goal.w,goal.h)

}

function drawTargets(){

for(let t of targets){

ctx.beginPath()
ctx.arc(t.x,t.y,15,0,Math.PI*2)
ctx.strokeStyle="yellow"
ctx.lineWidth=2
ctx.stroke()

}

}

function drawKeeper(){

ctx.fillStyle="#ffcc99"
ctx.beginPath()
ctx.arc(keeper.x,keeper.y-25,10,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="red"
ctx.lineWidth=5

ctx.beginPath()
ctx.moveTo(keeper.x,keeper.y-15)
ctx.lineTo(keeper.x,keeper.y+15)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(keeper.x-20,keeper.y-5)
ctx.lineTo(keeper.x+20,keeper.y-5)
ctx.stroke()

}

function drawBall(){

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2)
ctx.fill()

}

function update(){

ball.x+=ball.vx
ball.y+=ball.vy

ball.vx*=0.99
ball.vy*=0.99

// keeper idle move
if(!keeper.jump){

keeper.x+=keeper.dir

if(keeper.x>620 || keeper.x<280){
keeper.dir*=-1
}

}

// keeper jump
if(keeper.jump){

keeper.x+=(keeper.targetX-keeper.x)*0.15

}

// collision
let d=Math.hypot(ball.x-keeper.x,ball.y-keeper.y)

if(d<25){

reset()

}

// GOAL
if(ball.y<goal.y+5 && ball.x>goal.x && ball.x<goal.x+goal.w){

score++
document.getElementById("score").innerText=score

reset()

}

// miss
if(ball.y<goal.y){

reset()

}

}

function reset(){

ball.x=450
ball.y=380
ball.vx=0
ball.vy=0

keeper.jump=false
shooting=false

}

function gameLoop(){

update()

drawField()
drawTargets()
drawKeeper()
drawBall()

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
