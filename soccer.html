```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Penalty Swipe Game</title>

<style>

body{
margin:0;
background:#2e8b3c;
overflow:hidden;
font-family:Arial;
}

#field{
position:relative;
width:100vw;
height:100vh;
background:#3fa34d;
}

/* gawang */

#goal{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
width:250px;
height:120px;
border:6px solid white;
border-bottom:none;
}

/* pemain */

#player{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
font-size:60px;
}

/* kiper */

#keeper{
position:absolute;
top:120px;
left:50%;
transform:translateX(-50%);
font-size:60px;
}

/* bola */

#ball{
position:absolute;
bottom:180px;
left:50%;
transform:translateX(-50%);
font-size:40px;
transition:1s;
}

</style>
</head>

<body>

<div id="field">

<div id="goal"></div>

<div id="keeper">🧤</div>

<div id="player">🧍</div>

<div id="ball">⚽</div>

</div>

<script>

let startX=0;
let startY=0;

let ball=document.getElementById("ball");
let keeper=document.getElementById("keeper");

/* DETECT SWIPE */

document.addEventListener("mousedown",(e)=>{
startX=e.clientX;
startY=e.clientY;
});

document.addEventListener("mouseup",(e)=>{

let dx=e.clientX-startX;
let dy=e.clientY-startY;

/* arah bola */

let newX=window.innerWidth/2 + dx;
let newY=150;

ball.style.left=newX+"px";
ball.style.top=newY+"px";

/* kiper random */

let r=Math.floor(Math.random()*3);

setTimeout(()=>{

if(r==0) keeper.style.left=(window.innerWidth/2-120)+"px";
if(r==1) keeper.style.left=(window.innerWidth/2)+"px";
if(r==2) keeper.style.left=(window.innerWidth/2+120)+"px";

},200);

});

</script>

</body>
</html>
