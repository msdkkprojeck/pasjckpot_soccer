<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Penalty Swipe Game</title>

<style>
body{
margin:0;
background:#2e8b3c;
overflow:hidden;
font-family:Arial;
text-align:center;
}

#field{
position:relative;
width:100vw;
height:100vh;
background:#3fa34d;
}

/* gawang */
#goal{
position:absolute;
top:80px;
left:50%;
transform:translateX(-50%);
width:260px;
height:130px;
border:6px solid white;
border-bottom:none;
}

/* pemain */
#player{
position:absolute;
bottom:140px;
left:50%;
transform:translateX(-50%);
font-size:70px;
}

/* kiper */
#keeper{
position:absolute;
top:140px;
left:50%;
transform:translateX(-50%);
font-size:70px;
transition:0.4s;
}

/* bola */
#ball{
position:absolute;
bottom:200px;
left:50%;
transform:translateX(-50%);
font-size:45px;
transition:0.8s;
}

/* hasil */
#result{
position:absolute;
top:40%;
left:50%;
transform:translateX(-50%);
font-size:50px;
color:white;
font-weight:bold;
text-shadow:2px 2px 5px black;
}
</style>
</head>

<body>

<div id="field">

<div id="goal"></div>

<div id="keeper">🧤</div>

<div id="player">🧍</div>

<div id="ball">⚽</div>

<div id="result"></div>

</div>

<script>

let startX=0;
let startY=0;

let ball=document.getElementById("ball");
let keeper=document.getElementById("keeper");
let result=document.getElementById("result");

/* swipe mulai */
document.addEventListener("mousedown",(e)=>{
startX=e.clientX;
startY=e.clientY;
});

/* swipe selesai */
document.addEventListener("mouseup",(e)=>{

let dx=e.clientX-startX;

/* arah bola */

let newX=window.innerWidth/2 + dx;
let newY=120;

ball.style.left=newX+"px";
ball.style.top=newY+"px";

/* kiper random */

let r=Math.floor(Math.random()*3);

setTimeout(()=>{

if(r==0){
keeper.style.left=(window.innerWidth/2-140)+"px";
}
if(r==1){
keeper.style.left=(window.innerWidth/2)+"px";
}
if(r==2){
keeper.style.left=(window.innerWidth/2+140)+"px";
}

},200);

/* cek goal */

setTimeout(()=>{

let keeperPos=keeper.getBoundingClientRect().left;
let ballPos=ball.getBoundingClientRect().left;

if(Math.abs(keeperPos-ballPos)<80){
result.innerHTML="SAVE!";
}else{
result.innerHTML="GOAL!";
}

},800);

});

</script>

</body>
</html>
