<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penalty Soccer 3D · suara gol & kecewa</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            background: linear-gradient(#1b5e20, #0b6623);
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #gameContainer {
            width: 900px;
            position: relative;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6);
            border-radius: 20px;
        }

        #ui {
            position: absolute;
            top: -55px;
            width: 100%;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 0 3px 8px black;
            background: rgba(0, 40, 0, 0.5);
            backdrop-filter: blur(3px);
            padding: 10px 0;
            border-radius: 60px;
            border: 2px solid #ffd966;
            letter-spacing: 1px;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            border: 6px solid white;
            border-radius: 24px;
            background: linear-gradient(#2e7d32, #1f5a25);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            cursor: crosshair;
        }

        #goalText {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 90px;
            font-weight: 900;
            color: #ffee88;
            text-shadow: 0 0 20px #ffaa00, 0 0 60px #ff8800;
            pointer-events: none;
            white-space: nowrap;
            z-index: 20;
        }

        .goalAnim {
            animation: goalPop 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes goalPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            40% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
            70% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.9; }
            100% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
        }

        #endScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 60px;
            border-radius: 20px;
            z-index: 30;
        }

        #playAgain {
            margin-top: 25px;
            padding: 18px 45px;
            font-size: 28px;
            border: none;
            border-radius: 60px;
            background: #ffaa33;
            color: #1a3b1a;
            box-shadow: 0 8px 0 #a05f00;
            cursor: pointer;
            font-weight: bold;
        }
        #playAgain:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #a05f00;
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <div id="ui">
        ⚽ SCORE: <span id="score">0</span> &nbsp; | &nbsp; SHOT: <span id="shot">0</span>/5
    </div>
    <div id="goalText">🔥 GOOOOL!!! 🔥</div>
    <div id="endScreen">
        <div>⚡ MATCH END ⚡</div>
        <button id="playAgain">🔄 PLAY AGAIN</button>
    </div>
    <canvas id="game" width="900" height="500"></canvas>
</div>

<script>
    (function() {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        // === AUDIO CONTEXT ===
        let audioCtx = null;

        // ===== SUARA GOOOOL (vocal + tepuk) =====
        function playGoalSound() {
            if (!audioCtx) {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => playGoalNow());
            } else {
                playGoalNow();
            }

            function playGoalNow() {
                if (!audioCtx) return;
                const masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.6;
                masterGain.connect(audioCtx.destination);

                const now = audioCtx.currentTime;

                // Suara "G" rendah
                const oscG = audioCtx.createOscillator();
                oscG.type = 'sawtooth';
                oscG.frequency.value = 120;
                const gainG = audioCtx.createGain();
                gainG.gain.setValueAtTime(0.4, now);
                gainG.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                oscG.connect(gainG);
                gainG.connect(masterGain);
                oscG.start(now);
                oscG.stop(now + 0.4);

                // Suara "OOOO" naik (150 → 350Hz)
                const oscO = audioCtx.createOscillator();
                oscO.type = 'triangle';
                oscO.frequency.setValueAtTime(150, now + 0.15);
                oscO.frequency.exponentialRampToValueAtTime(350, now + 1.0);
                const gainO = audioCtx.createGain();
                gainO.gain.setValueAtTime(0.5, now + 0.15);
                gainO.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
                oscO.connect(gainO);
                gainO.connect(masterGain);
                oscO.start(now + 0.15);
                oscO.stop(now + 1.2);

                // Tepuk tangan
                for (let i = 0; i < 8; i++) {
                    const delay = 0.3 + i * 0.12 + Math.random()*0.1;
                    const noiseBuffer = audioCtx.createBuffer(1, 2048, audioCtx.sampleRate);
                    const data = noiseBuffer.getChannelData(0);
                    for (let j = 0; j < 2048; j++) {
                        data[j] = (Math.random() * 2 - 1) * Math.exp(-j/300);
                    }
                    const noise = audioCtx.createBufferSource();
                    noise.buffer = noiseBuffer;
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 1600 + Math.random()*1200;
                    const gainNode = audioCtx.createGain();
                    gainNode.gain.value = 0.2 + Math.random()*0.15;
                    noise.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(masterGain);
                    noise.start(now + delay);
                    noise.stop(now + delay + 0.25);
                }
            }
        }

        // ===== SUARA KECEWA (penonton "Awwwww...") =====
        function playDisappointSound() {
            if (!audioCtx) {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => playDisappointNow());
            } else {
                playDisappointNow();
            }

            function playDisappointNow() {
                if (!audioCtx) return;
                const masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.45;
                masterGain.connect(audioCtx.destination);

                const now = audioCtx.currentTime;

                // Suara "Awww" (turun) dari 300Hz ke 150Hz
                const oscAww = audioCtx.createOscillator();
                oscAww.type = 'sawtooth';
                oscAww.frequency.setValueAtTime(320, now);
                oscAww.frequency.exponentialRampToValueAtTime(140, now + 0.9);
                const gainAww = audioCtx.createGain();
                gainAww.gain.setValueAtTime(0.35, now);
                gainAww.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
                oscAww.connect(gainAww);
                gainAww.connect(masterGain);
                oscAww.start(now);
                oscAww.stop(now + 1.0);

                // Desisan kecil (kekecewaan) - noise pendek
                for (let i = 0; i < 4; i++) {
                    const delay = i * 0.15;
                    const noiseBuffer = audioCtx.createBuffer(1, 1024, audioCtx.sampleRate);
                    const data = noiseBuffer.getChannelData(0);
                    for (let j = 0; j < 1024; j++) {
                        data[j] = (Math.random() * 2 - 1) * Math.exp(-j/200);
                    }
                    const noise = audioCtx.createBufferSource();
                    noise.buffer = noiseBuffer;
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 800;
                    const gainNode = audioCtx.createGain();
                    gainNode.gain.value = 0.15;
                    noise.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(masterGain);
                    noise.start(now + 0.2 + delay);
                    noise.stop(now + 0.4 + delay);
                }

                // sedikit siulan kecil (optional)
                const oscWhistle = audioCtx.createOscillator();
                oscWhistle.type = 'sine';
                oscWhistle.frequency.setValueAtTime(900, now+0.3);
                oscWhistle.frequency.exponentialRampToValueAtTime(400, now+0.8);
                const gainW = audioCtx.createGain();
                gainW.gain.setValueAtTime(0.1, now+0.3);
                gainW.gain.exponentialRampToValueAtTime(0.001, now+0.9);
                oscWhistle.connect(gainW);
                gainW.connect(masterGain);
                oscWhistle.start(now+0.3);
                oscWhistle.stop(now+0.9);
            }
        }

        // ===== GAME STATE =====
        let score = 0;
        let shot = 0;
        let shooting = false;
        let resetTimer = null;  // untuk cegah suara berulang

        // BOLA 3D
        let ball = {
            x: 450,
            y: 380,
            r: 15,
            vx: 0,
            vy: 0,
            rotation: 0
        };

        // KIPER
        let keeper = {
            x: 450,
            y: 140,
            dir: 2,
            jump: false,
            targetX: 450,
            dive: 0
        };

        // GAWANG - TINGGI SUDAH DITAMBAH (y jadi 60, tinggi mistar 90)
        let goal = {
            x: 320,
            y: 60,        // lebih tinggi dari sebelumnya (80 → 60)
            w: 260,
            h: 90         // tinggi gawang dari mistar ke bawah
        };

        let targets = [
            { x: 340, y: 90 },   // titik target disesuaikan karena gawang lebih tinggi
            { x: 450, y: 90 },
            { x: 560, y: 90 },
            { x: 340, y: 130 },
            { x: 560, y: 130 }
        ];

        // Kesulitan (diam-diam)
        const difficulty = 0.58;

        // Klik tendang
        canvas.addEventListener("click", (e) => {
            if (shooting || shot >= 5) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let mouseX = (e.clientX - rect.left) * scaleX;
            let mouseY = (e.clientY - rect.top) * scaleY;

            for (let t of targets) {
                let d = Math.hypot(mouseX - t.x, mouseY - t.y);
                if (d < 25) {
                    shootBall(t.x, t.y);
                    break;
            }
        }
        });

        function shootBall(tx, ty) {
            shooting = true;
            shot++;
            document.getElementById("shot").innerText = shot;

            ball.vx = (tx - ball.x) * 0.085;
            ball.vy = (ty - ball.y) * 0.085;

            // Kiper bereaksi
            let guess = Math.random();
            if (guess < difficulty) {
                keeper.targetX = tx;
            } else {
                keeper.targetX = goal.x + 40 + Math.random() * (goal.w - 80);
            }
            keeper.targetX = Math.min(goal.x + goal.w - 20, Math.max(goal.x + 20, keeper.targetX));
            keeper.jump = true;
        }

        // Gambar lapangan
        function drawField() {
            const grass = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grass.addColorStop(0, '#2e7d32');
            grass.addColorStop(0.7, '#1b5e20');
            ctx.fillStyle = grass;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(450, 300, 80, 0, 2*Math.PI);
            ctx.stroke();

            ctx.strokeStyle = 'white';
            ctx.lineWidth = 4;
            ctx.strokeRect(200, 200, 500, 200);
            ctx.beginPath();
            ctx.arc(450, 300, 8, 0, 2*Math.PI);
            ctx.fillStyle = 'white';
            ctx.fill();
        }

        // GAWANG dengan ukuran baru (lebih tinggi)
        function drawGoal() {
            ctx.shadowColor = '#00000060';
            ctx.shadowBlur = 12;

            // mistar (posisi y = goal.y)
            ctx.fillStyle = '#e0e0e0';
            ctx.fillRect(goal.x, goal.y, goal.w, 10);
            // tiang kiri (tinggi goal.h)
            ctx.fillRect(goal.x, goal.y, 10, goal.h);
            // tiang kanan
            ctx.fillRect(goal.x + goal.w - 10, goal.y, 10, goal.h);

            // bayangan tiang
            ctx.fillStyle = '#a0a0a0';
            ctx.fillRect(goal.x+5, goal.y+2, 5, goal.h-4);
            ctx.fillRect(goal.x+goal.w-15, goal.y+2, 5, goal.h-4);

            // net (garis-garis)
            ctx.strokeStyle = 'rgba(220,220,255,0.6)';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < goal.w; i+=20) {
                ctx.beginPath();
                ctx.moveTo(goal.x + i, goal.y);
                ctx.lineTo(goal.x + i - 8, goal.y + goal.h);
                ctx.stroke();
            }
            for (let j = goal.y; j < goal.y + goal.h; j+=15) {
                ctx.beginPath();
                ctx.moveTo(goal.x, j);
                ctx.lineTo(goal.x + goal.w, j - 10);
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
        }

        // Titik target (disesuaikan dengan tinggi gawang baru)
        function drawTargets() {
            for (let t of targets) {
                ctx.beginPath();
                ctx.arc(t.x, t.y, 16, 0, 2*Math.PI);
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(t.x, t.y, 8, 0, 2*Math.PI);
                ctx.fillStyle = '#ffcc00';
                ctx.fill();
            }
        }

        // KIPER 3D
        function drawKeeper() {
            const kx = keeper.x;
            const ky = keeper.y - (keeper.jump ? 5 * Math.sin(Date.now()*0.02) : 0);

            ctx.shadowColor = '#00000070';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 3;

            ctx.fillStyle = '#225577';
            ctx.beginPath();
            ctx.ellipse(kx, ky-15, 14, 20, 0, 0, 2*Math.PI);
            ctx.fill();

            ctx.fillStyle = '#f7d9aa';
            ctx.beginPath();
            ctx.ellipse(kx, ky-40, 12, 14, 0, 0, 2*Math.PI);
            ctx.fill();

            ctx.fillStyle = '#cc5500';
            ctx.beginPath();
            ctx.ellipse(kx-2, ky-52, 12, 6, 0, 0, 2*Math.PI);
            ctx.fill();

            ctx.fillStyle = '#f7d9aa';
            ctx.beginPath();
            ctx.ellipse(kx-22, ky-25, 8, 6, 0.3, 0, 2*Math.PI);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(kx+22, ky-25, 8, 6, -0.2, 0, 2*Math.PI);
            ctx.fill();

            ctx.fillStyle = '#b8860b';
            ctx.beginPath();
            ctx.ellipse(kx-32, ky-22, 7, 6, 0, 0, 2*Math.PI);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(kx+32, ky-22, 7, 6, 0, 0, 2*Math.PI);
            ctx.fill();

            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(kx-5, ky-44, 3, 0, 2*Math.PI);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(kx+5, ky-44, 3, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.arc(kx-6, ky-45, 1.5, 0, 2*Math.PI);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(kx+4, ky-45, 1.5, 0, 2*Math.PI);
            ctx.fill();

            ctx.shadowBlur = 8;
            ctx.fillStyle = '#1a3a3a';
            ctx.globalAlpha = 0.4;
            ctx.beginPath();
            ctx.ellipse(kx, ky, 25, 8, 0, 0, 2*Math.PI);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        // Pemain penendang
        function drawPlayer() {
            let x = 450, y = 420;
            ctx.shadowColor = '#00000070';
            ctx.shadowBlur = 10;

            ctx.fillStyle = '#c44c0e';
            ctx.beginPath();
            ctx.ellipse(x, y-15, 15, 25, 0, 0, 2*Math.PI);
            ctx.fill();

            ctx.fillStyle = '#f7d9aa';
            ctx.beginPath();
            ctx.arc(x, y-45, 14, 0, 2*Math.PI);
            ctx.fill();

            ctx.fillStyle = '#382010';
            ctx.beginPath();
            ctx.ellipse(x-3, y-55, 8, 5, 0, 0, 2*Math.PI);
            ctx.fill();

            ctx.fillStyle = '#0a2f6a';
            ctx.fillRect(x-15, y-5, 12, 30);
            ctx.fillRect(x+5, y-5, 12, 30);

            ctx.fillStyle = '#222';
            ctx.fillRect(x-20, y+20, 18, 8);
            ctx.fillRect(x+5, y+20, 18, 8);
            ctx.shadowBlur = 0;
        }

        // BOLA 3D
        function drawBall() {
            ball.rotation += 0.05;

            ctx.shadowColor = '#00000090';
            ctx.shadowBlur = 20;
            ctx.shadowOffsetY = 5;

            const grad = ctx.createRadialGradient(ball.x-6, ball.y-6, 4, ball.x, ball.y, ball.r+5);
            grad.addColorStop(0, '#f8f8f8');
            grad.addColorStop(0.4, '#cccccc');
            grad.addColorStop(0.8, '#7a7a7a');
            grad.addColorStop(1, '#3a3a3a');

            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, 2*Math.PI);
            ctx.fillStyle = grad;
            ctx.fill();

            ctx.strokeStyle = '#2b2b2b';
            ctx.lineWidth = 2.2;
            for (let i = 0; i < 5; i++) {
                let angle = (i/5)*2*Math.PI + ball.rotation*0.5;
                let x1 = ball.x + ball.r*0.7*Math.cos(angle);
                let y1 = ball.y + ball.r*0.7*Math.sin(angle);
                let x2 = ball.x + ball.r*0.7*Math.cos(angle+1.2);
                let y2 = ball.y + ball.r*0.7*Math.sin(angle+1.2);
                ctx.beginPath();
                ctx.moveTo(ball.x + ball.r*0.3*Math.cos(angle), ball.y + ball.r*0.3*Math.sin(angle));
                ctx.lineTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.ellipse(ball.x, ball.y, ball.r*0.75, ball.r*0.4, ball.rotation*0.2, 0, 2*Math.PI);
            ctx.strokeStyle = '#151515';
            ctx.stroke();

            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(ball.x-4, ball.y-5, 4, 0, 2*Math.PI);
            ctx.fillStyle = '#ffffff60';
            ctx.fill();
        }

        // Update dengan suara kecewa jika gagal
        function update() {
            ball.x += ball.vx;
            ball.y += ball.vy;
            ball.vx *= 0.98;
            ball.vy *= 0.98;

            if (!keeper.jump) {
                keeper.x += keeper.dir;
                if (keeper.x > 600 || keeper.x < 300) keeper.dir *= -1;
            } else {
                keeper.x += (keeper.targetX - keeper.x) * 0.16;
            }

            // Simpan status sebelum reset untuk deteksi gagal
            let willReset = false;
            let reason = '';

            // Collision dengan kiper
            let d = Math.hypot(ball.x - keeper.x, ball.y - (keeper.y-20));
            if (d < 35) {
                willReset = true;
                reason = 'keeper';
            }

            // Cek goal (pakai tinggi gawang baru: goal.y + goal.h)
            if (ball.y < goal.y + goal.h && ball.x > goal.x && ball.x < goal.x + goal.w && ball.y > goal.y) {
                // GOAL
                score++;
                document.getElementById("score").innerText = score;

                playGoalSound();   // SUARA GOOOOL!
                showGoal();
                reset();
                return;
            }

            // Bola keluar lapangan bawah atau atas
            if (ball.y < goal.y - 10 || ball.y > 500 || ball.x < 0 || ball.x > 900) {
                willReset = true;
                reason = 'out';
            }

            // Jika akan reset karena gagal (tidak gol) dan sedang dalam mode shooting, mainkan suara kecewa
            if (willReset && shooting && !(shot >= 5)) {
                // Hindari spam suara dengan timer sederhana
                if (!resetTimer) {
                    playDisappointSound();  // SUARA KECEWA
                    resetTimer = setTimeout(() => { resetTimer = null; }, 300);
                }
                reset();
            }
        }

        function showGoal() {
            let g = document.getElementById("goalText");
            g.classList.remove("goalAnim");
            void g.offsetWidth;
            g.classList.add("goalAnim");
        }

        function reset() {
            if (shot >= 5) {
                matchEnd();
                return;
            }
            ball.x = 450;
            ball.y = 380;
            ball.vx = 0;
            ball.vy = 0;
            keeper.jump = false;
            shooting = false;
        }

        function matchEnd() {
            document.getElementById("endScreen").style.display = "flex";
            shooting = true;
        }

        document.getElementById("playAgain").onclick = function() {
            score = 0; shot = 0;
            document.getElementById("score").innerText = "0";
            document.getElementById("shot").innerText = "0";
            document.getElementById("endScreen").style.display = "none";
            reset();
            shooting = false;
            ball.x = 450; ball.y = 380; ball.vx = 0; ball.vy = 0;
            keeper.jump = false;
        };

        // Loop
        function gameLoop() {
            update();
            drawField();
            drawGoal();
            drawTargets();
            drawKeeper();
            drawPlayer();
            drawBall();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();

        // Aktifkan audio setelah interaksi
        function enableAudio() {
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {}
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        canvas.addEventListener('click', enableAudio, { once: true });
        document.getElementById("playAgain").addEventListener('click', enableAudio, { once: true });

    })();
</script>
</body>
</html>
