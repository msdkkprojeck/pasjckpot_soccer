<!DOCTYPE html>
<html>
<head>
<title>Penalty Soccer</title>

<style>

body{
margin:0;
background:linear-gradient(#1b5e20,#0b6623);
font-family:Arial;
overflow:hidden;
}

/* container */

#gameContainer{
width:900px;
margin:auto;
margin-top:30px;
position:relative;
}

/* scoreboard */

#ui{
position:absolute;
top:-50px;
width:100%;
text-align:center;
font-size:28px;
font-weight:bold;
color:white;
text-shadow:0 2px 5px black;
background:rgba(0,0,0,0.3);
padding:10px;
border-radius:10px;
}

/* canvas */

canvas{
display:block;
border:6px solid white;
border-radius:12px;
background:linear-gradient(#4caf50,#388e3c);
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

</style>
</head>

<body>

<div id="gameContainer">

<div id="ui">
⚽ Score: <span id="score">0</span> | Shot: <span id="shot">0</span>/5
</div>

<canvas id="game" width="900" height="500"></canvas>

</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let score=0
let shot=0
let shooting=false

let ball={
x:450,
y:380,
r:10,
vx:0,
vy:0
}

let keeper={
x:450,
y:140,
dir:2,
jump:false,
targetX:450
}

let goal={
x:320,
y:80,
w:260
}

let targets=[
{x:340,y:110},
{x:450,y:110},
{x:560,y:110},
{x:340,y:150},
{x:560,y:150}
]

canvas.addEventListener("click",(e)=>{

if(shooting) return
if(shot>=5) return

let x=e.offsetX
let y=e.offsetY

for(let t of targets){

let d=Math.hypot(x-t.x,y-t.y)

if(d<20){
shootBall(t.x,t.y)
}

}

})

function shootBall(tx,ty){

shooting=true
shot++

document.getElementById("shot").innerText=shot

ball.vx=(tx-ball.x)*0.08
ball.vy=(ty-ball.y)*0.08

let guess=Math.random()

if(guess<0.6){
keeper.targetX=tx
}else{
keeper.targetX=goal.x+Math.random()*goal.w
}

keeper.jump=true

}

function drawField(){

ctx.fillStyle="#43a047"
ctx.fillRect(0,0,canvas.width,canvas.height)

/* garis tengah */

ctx.strokeStyle="white"
ctx.lineWidth=3

ctx.strokeRect(200,200,500,200)

}

function drawGoal(){

ctx.fillStyle="white"

ctx.fillRect(goal.x,80,goal.w,8)
ctx.fillRect(goal.x,80,8,70)
ctx.fillRect(goal.x+goal.w-8,80,8,70)

/* jaring */

ctx.strokeStyle="rgba(255,255,255,0.3)"

for(let i=0;i<goal.w;i+=20){

ctx.beginPath()
ctx.moveTo(goal.x+i,80)
ctx.lineTo(goal.x+i,150)
ctx.stroke()

}

}

function drawTargets(){

for(let t of targets){

ctx.beginPath()
ctx.arc(t.x,t.y,12,0,Math.PI*2)
ctx.strokeStyle="yellow"
ctx.lineWidth=2
ctx.stroke()

}

}

function drawKeeper(){

ctx.fillStyle="#ffcc99"

ctx.beginPath()
ctx.arc(keeper.x,keeper.y-25,10,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="black"
ctx.lineWidth=5

ctx.beginPath()
ctx.moveTo(keeper.x,keeper.y-15)
ctx.lineTo(keeper.x,keeper.y+15)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(keeper.x-20,keeper.y-5)
ctx.lineTo(keeper.x+20,keeper.y-5)
ctx.stroke()

}

function drawPlayer(){

let x=450
let y=420

ctx.fillStyle="#ffcc99"

ctx.beginPath()
ctx.arc(x,y-35,10,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="blue"
ctx.lineWidth=5

ctx.beginPath()
ctx.moveTo(x,y-25)
ctx.lineTo(x,y)
ctx.stroke()

}

function drawBall(){

/* shadow */

ctx.fillStyle="rgba(0,0,0,0.3)"

ctx.beginPath()
ctx.ellipse(ball.x,ball.y+10,10,4,0,0,Math.PI*2)
ctx.fill()

/* bola */

ctx.fillStyle="white"

ctx.beginPath()
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2)
ctx.fill()

}

function update(){

ball.x+=ball.vx
ball.y+=ball.vy

ball.vx*=0.99
ball.vy*=0.99

if(!keeper.jump){

keeper.x+=keeper.dir

if(keeper.x>600 || keeper.x<300){
keeper.dir*=-1
}

}else{

keeper.x+=(keeper.targetX-keeper.x)*0.15

}

let d=Math.hypot(ball.x-keeper.x,ball.y-keeper.y)

if(d<25){
reset()
}

if(ball.y<90 && ball.x>goal.x && ball.x<goal.x+goal.w){

score++
document.getElementById("score").innerText=score

reset()

}

if(ball.y<80){
reset()
}

}

function reset(){

ball.x=450
ball.y=380
ball.vx=0
ball.vy=0

keeper.jump=false
shooting=false

}

function gameLoop(){

update()

drawField()
drawGoal()
drawTargets()
drawKeeper()
drawPlayer()
drawBall()

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
