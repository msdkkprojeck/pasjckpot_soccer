<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Penalty Soccer Engine V2</title>

<style>

body{
margin:0;
background:#0c5a21;
font-family:Arial;
overflow:hidden;
}

#game{
position:relative;
width:900px;
height:500px;
margin:auto;
margin-top:40px;
background:linear-gradient(#1f8f3a,#15732e);
border:6px solid white;
border-radius:10px;
}

#goal{
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
width:400px;
height:120px;
border:6px solid white;
border-bottom:none;
}

#net{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:
repeating-linear-gradient(
90deg,
rgba(255,255,255,0.3) 0px,
rgba(255,255,255,0.3) 2px,
transparent 2px,
transparent 20px
),
repeating-linear-gradient(
0deg,
rgba(255,255,255,0.3) 0px,
rgba(255,255,255,0.3) 2px,
transparent 2px,
transparent 20px
);
}

#goalie{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
width:70px;
height:70px;
background:#2196f3;
border-radius:10px;
transition:0.4s;
}

#ball{
position:absolute;
bottom:60px;
left:50%;
transform:translateX(-50%);
width:30px;
height:30px;
background:white;
border-radius:50%;
box-shadow:0 0 10px #fff;
cursor:pointer;
transition:0.7s;
}

#score{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:22px;
font-weight:bold;
}

#goalText{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%) scale(0);
font-size:70px;
font-weight:bold;
color:#00ff00;
text-shadow:0 0 20px #0f0,0 0 40px #0f0;
pointer-events:none;
}

.goal-animation{
animation:goalPop 1s ease;
}

@keyframes goalPop{

0%{
transform:translate(-50%,-50%) scale(0);
opacity:0;
}

50%{
transform:translate(-50%,-50%) scale(1.5);
opacity:1;
}

100%{
transform:translate(-50%,-50%) scale(1);
opacity:0;
}

}

</style>
</head>

<body>

<div id="game">

<div id="score">Score: 0</div>

<div id="goal">
<div id="net"></div>
</div>

<div id="goalie"></div>

<div id="ball"></div>

<div id="goalText">GOOOAL!!! ⚽</div>

</div>

<script>

let ball = document.getElementById("ball")
let goalie = document.getElementById("goalie")
let score = 0

ball.addEventListener("click", shoot)

function shoot(){

let direction = Math.random()

let targetX
let targetY = 100

if(direction < 0.33){
targetX = 250
}
else if(direction < 0.66){
targetX = 450
}
else{
targetX = 650
}

ball.style.left = targetX + "px"
ball.style.bottom = "350px"

goalieJump()

setTimeout(checkGoal,600)

setTimeout(resetBall,1200)

}

function goalieJump(){

let dir = Math.floor(Math.random()*3)

if(dir == 0){
goalie.style.left = "30%"
}
else if(dir == 1){
goalie.style.left = "50%"
}
else{
goalie.style.left = "70%"
}

}

function checkGoal(){

let ballX = ball.offsetLeft
let goalieX = goalie.offsetLeft

if(Math.abs(ballX - goalieX) > 80){

score++
document.getElementById("score").innerText="Score: "+score

showGoal()

}

}

function resetBall(){

ball.style.left = "50%"
ball.style.bottom = "60px"
ball.style.transform="translateX(-50%)"

goalie.style.left="50%"

}

function showGoal(){

let goal = document.getElementById("goalText")

goal.classList.remove("goal-animation")

void goal.offsetWidth

goal.classList.add("goal-animation")

}

</script>

</body>
</html>
