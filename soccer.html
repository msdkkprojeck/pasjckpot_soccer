<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>permainan erik tan</title>

<style>
body {
  margin: 0;
  background: #0c1b2a;
  text-align: center;
  color: white;
  font-family: Arial;
}

.field {
  width: 400px;
  height: 600px;
  margin: auto;
  position: relative;
  background: url("https://i.ibb.co/q3XB9T0L/gawang-dan-lapangan.png") center/cover no-repeat;
  overflow: hidden;
  border-radius: 15px;
}

/* 🧤 KIPER */
#keeper {
  position: absolute;
  top: 230px;
  left: 50%;
  transform: translateX(-50%);
  width: 130px;
  z-index: 2;
  transition: all 0.3s ease;
}

/* 🧍 PLAYER */
#player {
  position: absolute;
  bottom: -40px;
  left: 50%;
  transform: translateX(-50%);
  width: 230px;
  z-index: 3;
  transition: 0.2s;
}

/* ⚽ BOLA */
#ball {
  position: absolute;
  bottom: 135px;
  left: 50%;
  transform: translateX(-50%);
  width: 45px;
  z-index: 4;
  transition: all 0.6s cubic-bezier(.3,1.5,.5,1);
}

/* RESULT */
#result {
  position: absolute;
  top: 70px;
  width: 100%;
  font-size: 30px;
  font-weight: bold;
  opacity: 0;
  text-shadow: 0 0 15px gold;
}

/* SHAKE */
@keyframes shake {
  0% { transform: translate(0); }
  25% { transform: translate(-5px, 5px); }
  50% { transform: translate(5px, -5px); }
  75% { transform: translate(-5px, 5px); }
  100% { transform: translate(0); }
}

button {
  padding: 10px 20px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>permainan erik tan</h2>

<div class="field">

  <div id="result"></div>

  <img id="keeper" src="https://i.ibb.co/DPBmgWRZ/keper-sebelum-mulai.png">
  <img id="ball" src="https://i.ibb.co/0y0y781R/ef0e8f27-9a69-4ccb-91d3-117a49b06db9.png">
  <img id="player" src="https://i.ibb.co/k66M9qqz/penandang-gambar-1.png">

</div>

<div>
  <button onclick="shoot('left')">Kiri</button>
  <button onclick="shoot('center')">Tengah</button>
  <button onclick="shoot('right')">Kanan</button>
</div>

<h3>Score: <span id="score">0</span></h3>

<script>
let score = 0;
let isPlaying = false;

const assets = {
  player_idle: "https://i.ibb.co/k66M9qqz/penandang-gambar-1.png",
  player_kick: "https://i.ibb.co/nsfh5VSX/penendang-gambar-3.png",

  keeper_idle: "https://i.ibb.co/DPBmgWRZ/keper-sebelum-mulai.png",
  keeper_ready: "https://i.ibb.co/0pKTdxdM/sudah-mulai-dan-bersiap.png",
  keeper_left: "https://i.ibb.co/v66vC5yz/kiper-diving-kiri.png",
  keeper_center: "https://i.ibb.co/0pKTdxdM/sudah-mulai-dan-bersiap.png",
  keeper_right: "https://i.ibb.co/9SLqdWg/kiper-diving-kanan.png"
};

function shoot(direction) {
  if (isPlaying) return;
  isPlaying = true;

  const player = document.getElementById("player");
  const ball = document.getElementById("ball");
  const keeper = document.getElementById("keeper");
  const result = document.getElementById("result");
  const field = document.querySelector(".field");

  const directions = ["left","center","right"];
  const keeperMove = directions[Math.floor(Math.random()*3)];

  // RESET BALL
  ball.style.transition = "none";
  ball.style.left = "50%";
  ball.style.bottom = "135px";

  setTimeout(() => {
    ball.style.transition = "all 0.6s cubic-bezier(.3,1.5,.5,1)";
  }, 50);

  // PLAYER NENDANG
  player.src = assets.player_kick;
  player.style.transform = "translateX(-50%) scale(1.1)";

  setTimeout(() => {
    player.style.transform = "translateX(-50%) scale(1)";
  }, 200);

  // KIPER SIAP
  setTimeout(() => {
    keeper.src = assets.keeper_ready;
  }, 150);

  // GERAK BOLA
  setTimeout(() => {

    if (direction === "left") ball.style.left = "35%";
    if (direction === "center") ball.style.left = "50%";
    if (direction === "right") ball.style.left = "65%";

    ball.style.transform = "translateX(-50%) scale(0.6)";
    ball.style.bottom = "360px";

  }, 200);

  // GERAK KIPER
  setTimeout(() => {
    if (keeperMove === "left") {
      keeper.src = assets.keeper_left;
      keeper.style.left = "30%";
    }
    if (keeperMove === "center") {
      keeper.src = assets.keeper_center;
      keeper.style.left = "50%";
    }
    if (keeperMove === "right") {
      keeper.src = assets.keeper_right;
      keeper.style.left = "70%";
    }
  }, 400);

  // HASIL
  setTimeout(() => {
    if (direction !== keeperMove) {
      score++;
      result.innerText = "GOAL!!! 🔥 bang erik";
      result.style.color = "gold";
      field.style.animation = "shake 0.3s";
    } else {
      result.innerText = "KETANGKAP 🧤";
      result.style.color = "red";
    }

    result.style.opacity = 1;
    document.getElementById("score").innerText = score;

    setTimeout(() => {
      result.style.opacity = 0;
      field.style.animation = "";

      player.src = assets.player_idle;
      keeper.src = assets.keeper_idle;

      ball.style.bottom = "135px";
      ball.style.left = "50%";
      ball.style.transform = "translateX(-50%) scale(1)";

      keeper.style.left = "50%";

      isPlaying = false;
    }, 700);

  }, 900);
}
</script>

</body>
</html>
