<!DOCTYPE html>
<html>
<head>
<title>Penalty Soccer</title>

<style>

body{
margin:0;
background:linear-gradient(#1b5e20,#0b6623);
font-family:Arial;
overflow:hidden;
}

#gameContainer{
width:900px;
margin:auto;
margin-top:30px;
position:relative;
}

#ui{
position:absolute;
top:-50px;
width:100%;
text-align:center;
font-size:28px;
font-weight:bold;
color:white;
text-shadow:0 2px 5px black;
background:rgba(0,0,0,0.3);
padding:10px;
border-radius:10px;
}

canvas{
display:block;
border:6px solid white;
border-radius:12px;
background:linear-gradient(#4caf50,#388e3c);
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

/* GOAL TEXT */

#goalText{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%) scale(0);
font-size:90px;
font-weight:bold;
color:#00ff00;
text-shadow:0 0 20px #0f0,0 0 50px #0f0;
pointer-events:none;
}

.goalAnim{
animation:goalPop 1s ease;
}

@keyframes goalPop{

0%{transform:translate(-50%,-50%) scale(0);opacity:0;}
50%{transform:translate(-50%,-50%) scale(1.5);opacity:1;}
100%{transform:translate(-50%,-50%) scale(1);opacity:0;}

}

/* MATCH END */

#endScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
font-size:50px;
}

#playAgain{
margin-top:20px;
padding:15px 30px;
font-size:22px;
border:none;
border-radius:10px;
background:#ff9800;
cursor:pointer;
}

</style>
</head>

<body>

<div id="gameContainer">

<div id="ui">
⚽ Score: <span id="score">0</span> | Shot: <span id="shot">0</span>/5
</div>

<div id="goalText">GOOOAL!!!</div>

<div id="endScreen">
<div>MATCH END</div>
<button id="playAgain">PLAY AGAIN</button>
</div>

<canvas id="game" width="900" height="500"></canvas>

</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let score=0
let shot=0
let shooting=false

let ball={
x:450,
y:380,
r:12,
vx:0,
vy:0
}

let keeper={
x:450,
y:140,
dir:2,
jump:false,
targetX:450
}

let goal={
x:320,
y:80,
w:260
}

let targets=[
{x:340,y:110},
{x:450,y:110},
{x:560,y:110},
{x:340,y:150},
{x:560,y:150}
]

canvas.addEventListener("click",(e)=>{

if(shooting) return
if(shot>=5) return

let x=e.offsetX
let y=e.offsetY

for(let t of targets){

let d=Math.hypot(x-t.x,y-t.y)

if(d<20){
shootBall(t.x,t.y)
}

}

})

function shootBall(tx,ty){

shooting=true
shot++

document.getElementById("shot").innerText=shot

ball.vx=(tx-ball.x)*0.08
ball.vy=(ty-ball.y)*0.08

let guess=Math.random()

if(guess<0.6){
keeper.targetX=tx
}else{
keeper.targetX=goal.x+Math.random()*goal.w
}

keeper.jump=true

}

/* FIELD */

function drawField(){

ctx.fillStyle="#43a047"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="white"
ctx.lineWidth=3
ctx.strokeRect(200,200,500,200)

}

/* GOAL + NET */

function drawGoal(){

ctx.fillStyle="white"

ctx.fillRect(goal.x,80,goal.w,8)
ctx.fillRect(goal.x,80,8,70)
ctx.fillRect(goal.x+goal.w-8,80,8,70)

/* NET GRID */

ctx.strokeStyle="rgba(255,255,255,0.4)"

for(let i=0;i<goal.w;i+=15){

ctx.beginPath()
ctx.moveTo(goal.x+i,80)
ctx.lineTo(goal.x+i,150)
ctx.stroke()

}

for(let j=80;j<150;j+=15){

ctx.beginPath()
ctx.moveTo(goal.x,j)
ctx.lineTo(goal.x+goal.w,j)
ctx.stroke()

}

}

/* TARGET */

function drawTargets(){

for(let t of targets){

ctx.beginPath()
ctx.arc(t.x,t.y,12,0,Math.PI*2)
ctx.strokeStyle="yellow"
ctx.lineWidth=2
ctx.stroke()

}

}

/* KEEPER */

function drawKeeper(){

ctx.fillStyle="#ffcc99"

ctx.beginPath()
ctx.arc(keeper.x,keeper.y-25,10,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="black"
ctx.lineWidth=5

ctx.beginPath()
ctx.moveTo(keeper.x,keeper.y-15)
ctx.lineTo(keeper.x,keeper.y+15)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(keeper.x-20,keeper.y-5)
ctx.lineTo(keeper.x+20,keeper.y-5)
ctx.stroke()

}

/* PLAYER */

function drawPlayer(){

let x=450
let y=420

ctx.fillStyle="#ffcc99"

ctx.beginPath()
ctx.arc(x,y-35,10,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="blue"
ctx.lineWidth=5

ctx.beginPath()
ctx.moveTo(x,y-25)
ctx.lineTo(x,y)
ctx.stroke()

}

/* REAL BALL */

function drawBall(){

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="black"
ctx.lineWidth=2

ctx.beginPath()
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(ball.x-5,ball.y)
ctx.lineTo(ball.x+5,ball.y)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(ball.x,ball.y-5)
ctx.lineTo(ball.x,ball.y+5)
ctx.stroke()

}

/* UPDATE */

function update(){

ball.x+=ball.vx
ball.y+=ball.vy

ball.vx*=0.99
ball.vy*=0.99

if(!keeper.jump){

keeper.x+=keeper.dir

if(keeper.x>600 || keeper.x<300){
keeper.dir*=-1
}

}else{

keeper.x+=(keeper.targetX-keeper.x)*0.15

}

let d=Math.hypot(ball.x-keeper.x,ball.y-keeper.y)

if(d<25){
reset()
}

if(ball.y<90 && ball.x>goal.x && ball.x<goal.x+goal.w){

score++
document.getElementById("score").innerText=score

showGoal()

reset()

}

if(ball.y<80){
reset()
}

}

/* GOAL ANIMATION */

function showGoal(){

let g=document.getElementById("goalText")

g.classList.remove("goalAnim")
void g.offsetWidth
g.classList.add("goalAnim")

}

/* RESET */

function reset(){

if(shot>=5){
matchEnd()
return
}

ball.x=450
ball.y=380
ball.vx=0
ball.vy=0

keeper.jump=false
shooting=false

}

/* MATCH END */

function matchEnd(){

document.getElementById("endScreen").style.display="flex"

}

document.getElementById("playAgain").onclick=function(){

score=0
shot=0

document.getElementById("score").innerText=0
document.getElementById("shot").innerText=0

document.getElementById("endScreen").style.display="none"

reset()

}

/* LOOP */

function gameLoop(){

update()

drawField()
drawGoal()
drawTargets()
drawKeeper()
drawPlayer()
drawBall()

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
