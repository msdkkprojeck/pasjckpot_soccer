<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Penalty Jackpot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">

  <div class="field">

    <!-- TEXT RESULT -->
    <div id="resultText"></div>

    <!-- KIPER -->
    <img id="keeper" src="KEEPER_IDLE.png">

    <!-- BOLA -->
    <img id="ball" src="BALL.png">

    <!-- CLICK AREA -->
    <div class="shoot-area">
      <div onclick="shoot('left')" class="zone"></div>
      <div onclick="shoot('center')" class="zone"></div>
      <div onclick="shoot('right')" class="zone"></div>
    </div>

  </div>

  <h2>Score: <span id="score">0</span></h2>

</div>

<script src="script.js"></script>
</body>
</html>
