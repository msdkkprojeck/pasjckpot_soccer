<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Penalty Game</title>

<style>
body {
  margin: 0;
  background: #0c1b2a;
  text-align: center;
  color: white;
  font-family: Arial;
}

.field {
  width: 400px;
  height: 600px;
  margin: auto;
  position: relative;
  background: url("https://i.ibb.co/q3XB9T0L/gawang-dan-lapangan.png") center/cover no-repeat;
  overflow: hidden;
  border-radius: 15px;
}

/* 🧤 KIPER */
#keeper {
  position: absolute;
  top: 150px;
  left: 50%;
  transform: translateX(-50%);
  width: 110px;
  z-index: 2;
  transition: all 0.3s ease;
  filter: drop-shadow(0 6px 6px rgba(0,0,0,0.5));
}

/* ⚽ BOLA */
#ball {
  position: absolute;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%);
  width: 38px;
  z-index: 4;
  transition: all 0.6s cubic-bezier(.3,1.5,.5,1);
  filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
}

/* 🧍 PLAYER */
#player {
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 150px;
  z-index: 3;
  transition: 0.2s;
  filter: drop-shadow(0 8px 8px rgba(0,0,0,0.6));
}

/* RESULT TEXT */
#result {
  position: absolute;
  top: 70px;
  width: 100%;
  font-size: 30px;
  font-weight: bold;
  text-align: center;
  opacity: 0;
  z-index: 5;
  text-shadow: 0 0 15px gold;
}

/* SHAKE */
@keyframes shake {
  0% { transform: translate(0); }
  25% { transform: translate(-5px, 5px); }
  50% { transform: translate(5px, -5px); }
  75% { transform: translate(-5px, 5px); }
  100% { transform: translate(0); }
}

button {
  padding: 10px 20px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>Penalty Game</h2>

<div class="field">

  <div id="result"></div>

  <img id="keeper" src="https://i.ibb.co/DPBmgWRZ/keper-sebelum-mulai.png">
  <img id="ball" src="https://i.ibb.co/WWFHTzwt/20260323-154207.jpg">
  <img id="player" src="https://i.ibb.co/F4qkqKLC/penendang-gambar-2.png">

</div>

<div>
  <button onclick="shoot('left')">Kiri</button>
  <button onclick="shoot('center')">Tengah</button>
  <button onclick="shoot('right')">Kanan</button>
</div>

<h3>Score: <span id="score">0</span></h3>

<script>
let score = 0;
let isPlaying = false;

const assets = {
  player_idle: "https://i.ibb.co/F4qkqKLC/penendang-gambar-2.png",
  player_kick: "https://i.ibb.co/nsfh5VSX/penendang-gambar-3.png",

  keeper_idle: "https://i.ibb.co/DPBmgWRZ/keper-sebelum-mulai.png",
  keeper_ready: "https://i.ibb.co/0pKTdxdM/sudah-mulai-dan-bersiap.png",
  keeper_left: "https://i.ibb.co/v66vC5yz/kiper-diving-kiri.png",
  keeper_center: "https://i.ibb.co/Sw8cQTkX/dapat-bola-1.png",
  keeper_right: "https://i.ibb.co/9SLqdWg/kiper-diving-kanan.png"
};

function shoot(direction) {
  if (isPlaying) return;
  isPlaying = true;

  const player = document.getElementById("player");
  const ball = document.getElementById("ball");
  const keeper = document.getElementById("keeper");
  const result = document.getElementById("result");
  const field = document.querySelector(".field");

  const directions = ["left","center","right"];
  const keeperMove = directions[Math.floor(Math.random()*3)];

  // PLAYER NENDANG
  player.src = assets.player_kick;
  player.style.transform = "translateX(-50%) scale(1.05)";

  setTimeout(() => {
    player.style.transform = "translateX(-50%) scale(1)";
  }, 200);

  // KIPER SIAP
  setTimeout(() => {
    keeper.src = assets.keeper_ready;
  }, 150);

  // GERAK BOLA (PERSEN BIAR RESPONSIVE)
  setTimeout(() => {
    if (direction === "left") ball.style.left = "25%";
    if (direction === "center") ball.style.left = "50%";
    if (direction === "right") ball.style.left = "75%";

    ball.style.transform = "translateX(-50%) scale(0.6)";
    ball.style.bottom = "420px";
  }, 200);

  // GERAK KIPER
  setTimeout(() => {
    if (keeperMove === "left") {
      keeper.src = assets.keeper_left;
      keeper.style.left = "25%";
    }
    if (keeperMove === "center") {
      keeper.src = assets.keeper_center;
      keeper.style.left = "50%";
    }
    if (keeperMove === "right") {
      keeper.src = assets.keeper_right;
      keeper.style.left = "75%";
    }

    keeper.style.transform = "translateX(-50%)";
  }, 400);

  // HASIL
  setTimeout(() => {
    if (direction !== keeperMove) {
      score++;
      result.innerText = "GOAL!!! 🔥";
      result.style.color = "gold";
      field.style.animation = "shake 0.3s";
    } else {
      result.innerText = "SAVE 🧤";
      result.style.color = "red";
    }

    result.style.opacity = 1;
    document.getElementById("score").innerText = score;

    setTimeout(() => {
      result.style.opacity = 0;
      field.style.animation = "";

      player.src = assets.player_idle;
      keeper.src = assets.keeper_idle;

      ball.style.bottom = "110px";
      ball.style.left = "50%";
      ball.style.transform = "translateX(-50%) scale(1)";

      keeper.style.left = "50%";

      isPlaying = false;
    }, 700);

  }, 900);
}
</script>

</body>
</html>
